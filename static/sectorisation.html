.legend-color { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }
.legend-separator { border-top: 1px solid #eee; margin: 6px 0; }
.legend small { color: #888; font-size: 11px; }

.info-panel {
  background: white; padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 12px; line-height: 1.6;
  max-width: 340px;
}
.info-panel h3 { font-size: 14px; margin-bottom: 6px; }
.info-panel .rule { background: #FFF3CD; border-left: 3px solid #D4850A; padding: 6px 10px; margin-top: 8px; border-radius: 4px; font-size: 11px; }

.home-icon {
  background: white; border: 3px solid; border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-weight: bold;
}
</style>
</head>

function createHomeMarker(latlng, name, color, sector, details) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:white;border:3px solid ${color};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.35);">🏠</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  return L.marker(latlng, { icon }).addTo(map)
    .bindPopup(`<strong>${name}</strong><br>Secteur ${sector}<br>${details}`);
}

    <div class="legend-separator"></div>
    <div class="legend-item"><div class="legend-color" style="background:transparent;border:2px dashed #D32F2F"></div> Frontieres de secteur</div>
    <div class="legend-item"><div class="legend-color" style="background:#D32F2F;border-radius:50%"></div> Points de jonction</div>
    <div class="legend-separator"></div>
    <small>MAJ 13 mars 2026</small>
  `;
  return div;
};
legend.addTo(map);

// Info panel
const info = L.control({ position: 'bottomleft' });
info.onAdd = function() {
  const div = L.DomUtil.create('div', 'info-panel');
  div.innerHTML = `
    <h3>Frontieres</h3>
    <table style="font-size:11px;width:100%;border-collapse:collapse;">
      <tr><td style="padding:3px 0;"><strong>Garonne nord</strong></td><td>David ↔ Gregory (metropole + estuaire)</td></tr>
      <tr><td style="padding:3px 0;"><strong>D106</strong></td><td>David ↔ Julien (sous Merignac)</td></tr>
      <tr><td style="padding:3px 0;"><strong>Garonne sud</strong></td><td>Julien ↔ Gregory (jusqu'a Portets)</td></tr>
      <tr><td style="padding:3px 0;"><strong>Ligne Portets-Sud</strong></td><td>Julien ↔ Gregory (Portets → Saucats → Landes)</td></tr>
    </table>
    <div class="rule">
      <strong>Regle 6 mois :</strong> Client non exploite depuis 6 mois = reattribuable.
    </div>
    <div style="margin-top:8px;font-size:10px;color:#666;">
      <strong>Equilibre :</strong> David ~290k (100% maisons) | Gregory ~320k (+ SE Gironde) | Julien ~340k (termites++)
    </div>
  `;
  return div;
};
info.addTo(map);

// Hover effects
function setupHover(poly) {
  poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.35, weight: 3 }); });
  poly.on('mouseout', function() { this.setStyle({ fillOpacity: 0.20, weight: 2 }); });
}
setupHover(nordOuestPoly);
setupHover(eastPoly);
setupHover(southPoly);

// Popups
nordOuestPoly.bindPopup('<strong>SECTEUR NORD-OUEST — David</strong><br>~290k hab (quasi 100% maisons)<br>Merignac + Bruges + Blanquefort<br>Medoc + Lesparre + Pauillac');
eastPoly.bindPopup('<strong>SECTEUR EST — Gregory</strong><br>~320k hab<br>Rive droite + Libournais + Blayais<br>+ Langon + Bazas + Captieux + La Reole<br>Entre-deux-Mers (2 rives sud Garonne)');
southPoly.bindPopup('<strong>SECTEUR SUD — Julien</strong><br>~340k hab (fort potentiel termites)<br>Pessac + Talence + Gradignan<br>Bassin d\'Arcachon + Landes<br>BNI Pessac');
</script>
