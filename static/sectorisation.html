<!DOCTYPE html>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
#map { width: 100%; height: 100vh; }

.legend {
  background: white; padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 13px; line-height: 1.8;
  max-width: 280px;
}
.legend h3 { font-size: 15px; margin-bottom: 8px; color: #1B3A5C; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }
.legend-separator { border-top: 1px solid #eee; margin: 6px 0; }
.legend small { color: #888; font-size: 11px; }

.info-panel {
  background: white; padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 12px; line-height: 1.6;
  max-width: 320px;
}
.info-panel h3 { font-size: 14px; margin-bottom: 6px; }
.info-panel .rule { background: #FFF3CD; border-left: 3px solid #D4850A; padding: 6px 10px; margin-top: 8px; border-radius: 4px; font-size: 11px; }

.home-icon {
  background: white; border: 3px solid; border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-weight: bold;
}
</style>
</head>

// HOME BASE MARKERS

function createHomeMarker(latlng, name, color, sector, details) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:white;border:3px solid ${color};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.35);">🏠</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  return L.marker(latlng, { icon }).addTo(map)
    .bindPopup(`<strong>${name}</strong><br>Secteur ${sector}<br>${details}`);
}

      iconAnchor: [0, 0]
    })
  }).addTo(map);
}

info.onAdd = function() {
  const div = L.DomUtil.create('div', 'info-panel');
  div.innerHTML = `
    <h3>Frontieres</h3>
    <table style="font-size:11px;width:100%;border-collapse:collapse;">
      <tr><td style="padding:3px 0;"><strong>Garonne</strong></td><td>Nord-Ouest ↔ Est (metropole + aval)</td></tr>
      <tr><td style="padding:3px 0;"><strong>D106</strong></td><td>Sous Merignac = Nord-Ouest (David) ↔ Sud (Julien)</td></tr>

// Hover effects
function setupHover(poly, color, fillColor) {
  poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.35, weight: 3 }); });
  poly.on('mouseout', function() { this.setStyle({ fillOpacity: 0.20, weight: 2 }); });
}
