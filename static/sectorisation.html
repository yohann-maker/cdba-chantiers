<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Sectorisation Commerciale CDBA — Carte</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; }
#map { width: 100%; height: 100vh; }

.legend {
  background: white; padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 13px; line-height: 1.8;
  max-width: 280px;
}
.legend h3 { font-size: 15px; margin-bottom: 8px; color: #1B3A5C; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; }
.legend-separator { border-top: 1px solid #eee; margin: 6px 0; }
.legend small { color: #888; font-size: 11px; }

.info-panel {
  background: white; padding: 14px 18px; border-radius: 10px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25); font-size: 12px; line-height: 1.6;
  max-width: 320px;
}
.info-panel h3 { font-size: 14px; margin-bottom: 6px; }
.info-panel .rule { background: #FFF3CD; border-left: 3px solid #D4850A; padding: 6px 10px; margin-top: 8px; border-radius: 4px; font-size: 11px; }

.home-icon {
  background: white; border: 3px solid; border-radius: 50%;
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-weight: bold;
}
</style>
</head>

// DRAW SECTORS
// ============================

}).addTo(map);

const eastPoly = L.polygon(sectorEast, {
  color: '#2E7D32', weight: 2, fillColor: '#66BB6A', fillOpacity: 0.20, dashArray: null
}).addTo(map);

}).addTo(map);

// ============================
// BOUNDARY LINES (thick, dashed)
// ============================

// Garonne (West ↔ East) — from triple point to estuary
const garonneLineNorth = [...garonneNorth, ...estuary];
L.polyline(garonneLineNorth, {
  color: '#D32F2F', weight: 4, dashArray: '12, 8', opacity: 0.9
}).addTo(map).bindPopup('<strong>Frontière Garonne</strong><br>Sépare Secteur OUEST (David) et Secteur EST (Gregory)');

// Garonne (East ↔ South) — from La Réole to triple point
L.polyline(garonne, {
  color: '#D32F2F', weight: 4, dashArray: '12, 8', opacity: 0.9
}).addTo(map).bindPopup('<strong>Frontière Garonne</strong><br>Sépare Secteur EST (Gregory) et Secteur SUD (Julien)');

// SW Line (West ↔ South) — from triple point to Landes
L.polyline(swBoundary, {
  color: '#D32F2F', weight: 4, dashArray: '12, 8', opacity: 0.9
}).addTo(map).bindPopup('<strong>Frontière Ouest/Sud</strong><br>Ligne Bègles → Belin-Béliet → Landes<br>Sépare Secteur OUEST (David) et Secteur SUD (Julien)');

// ============================
// TRIPLE POINT marker
// ============================
L.circleMarker([44.7950, -0.5440], {
  radius: 8, color: '#D32F2F', fillColor: '#D32F2F', fillOpacity: 1, weight: 2
}).addTo(map).bindPopup('<strong>Point triple</strong><br>Jonction des 3 secteurs<br>(sud Bordeaux / Bègles)');

// ============================
// HOME BASE MARKERS
// ============================

function createHomeMarker(latlng, name, color, sector, maisons) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:white;border:3px solid ${color};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.35);">🏠</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16]
  });
  return L.marker(latlng, { icon }).addTo(map)
    .bindPopup(`<strong>${name}</strong><br>Secteur ${sector}<br>~${maisons} maisons`);
}

createHomeMarker([44.8386, -0.6436], 'David — Mérignac', '#1565C0', 'OUEST', '195 000');
createHomeMarker([44.8567, -0.4417], 'Gregory — Pompignac', '#2E7D32', 'EST', '195 000');
createHomeMarker([44.3833, -0.8167], 'Julien — Saugnac-et-Muret', '#E65100', 'SUD', '190 000');

// ============================
// KEY CITY LABELS
// ============================

function addLabel(latlng, text, size) {
  L.marker(latlng, {
    icon: L.divIcon({
      className: '',
      html: `<div style="font-size:${size || 11}px;font-weight:600;color:#333;text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white;white-space:nowrap;">${text}</div>`,
      iconAnchor: [0, 0]
    })
  }).addTo(map);
}

// Sector labels (large, centered)
function addSectorLabel(latlng, text, color) {
  L.marker(latlng, {
    icon: L.divIcon({
      className: '',
      html: `<div style="font-size:18px;font-weight:800;color:${color};text-shadow:2px 2px 4px white,-2px -2px 4px white,2px -2px 4px white,-2px 2px 4px white;white-space:nowrap;letter-spacing:2px;opacity:0.7;">${text}</div>`,

// ============================
// LEGEND
// ============================

const legend = L.control({ position: 'topright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h3>Sectorisation CDBA</h3>
    <div class="legend-item"><div class="legend-color" style="background:#42A5F5"></div> <strong>OUEST</strong> — David (Mérignac)</div>
    <div class="legend-item"><div class="legend-color" style="background:#66BB6A"></div> <strong>EST</strong> — Gregory (Pompignac)</div>
    <div class="legend-item"><div class="legend-color" style="background:#FFA726"></div> <strong>SUD</strong> — Julien (Saugnac-et-Muret)</div>
    <div class="legend-separator"></div>
    <div class="legend-item"><div class="legend-color" style="background:transparent;border:2px dashed #D32F2F"></div> Frontières de secteur</div>
    <div class="legend-item"><div class="legend-color" style="background:#D32F2F;border-radius:50%"></div> Point triple (jonction)</div>
    <div class="legend-separator"></div>
    <small>~195 000 maisons / secteur<br>Frontière principale : la Garonne</small>
  `;
  return div;
};
legend.addTo(map);

// Info panel
const info = L.control({ position: 'bottomleft' });
info.onAdd = function() {
  const div = L.DomUtil.create('div', 'info-panel');
  div.innerHTML = `
    <h3>Frontières</h3>
    <table style="font-size:11px;width:100%;border-collapse:collapse;">
      <tr><td style="padding:3px 0;"><strong>Garonne</strong></td><td>Ouest ↔ Est (métropole) puis Est ↔ Sud (aval)</td></tr>
      <tr><td style="padding:3px 0;"><strong>Ligne SW</strong></td><td>Bègles → Belin-Béliet → Landes = Ouest ↔ Sud</td></tr>
      <tr><td style="padding:3px 0;"><strong>Dept. 33/40</strong></td><td>Julien déborde naturellement dans les Landes</td></tr>
    </table>
    <div class="rule">
      <strong>Règle 6 mois :</strong> Client non exploité depuis 6 mois = réattribuable à un autre commercial.
    </div>
  `;
  return div;
};
info.addTo(map);

// Hover effects
function setupHover(poly, color, fillColor) {
  poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.35, weight: 3 }); });
  poly.on('mouseout', function() { this.setStyle({ fillOpacity: 0.20, weight: 2 }); });
}
setupHover(westPoly);
setupHover(eastPoly);
setupHover(southPoly);

// Popups on sector click
westPoly.bindPopup('<strong>SECTEUR OUEST — David</strong><br>~195 000 maisons<br>Rive gauche + Médoc + Bassin d\'Arcachon<br>Urbain/périurbain + littoral');
eastPoly.bindPopup('<strong>SECTEUR EST — Gregory</strong><br>~195 000 maisons<br>Rive droite + Libournais + Blayais + Entre-deux-Mers<br>Périurbain + rural viticole');
southPoly.bindPopup('<strong>SECTEUR SUD — Julien</strong><br>~190 000 maisons<br>Sud Gironde + Nord Landes<br>Fort potentiel termites 🐛');

</body>
</html>
